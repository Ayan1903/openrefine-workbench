name: smoke-test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Ensure one_embedding.txt exists
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('one_embedding.txt')
          if not p.exists():
              json.dump([0.0]*384, open(p, 'w', encoding='utf-8'))
              print("Created one_embedding.txt (384 zeros)")
          else:
              print("one_embedding.txt already exists")
          PY

      - name: Run short bench smoke (Python)
        run: |
          python -m pip install --upgrade pip
          python scripts/bench_search.py --out-csv bench_ci.csv || true

      - name: Upload bench artifact if exists
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci-csv
          path: bench_ci.csv
