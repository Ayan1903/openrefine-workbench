name: Smoke Test

on:
  push:
    branches: [ main, ci/* ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    fail-fast: false
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Start mock server
        run: |
          python mock_server.py > mock.log 2>&1 &
          sleep 2

      - name: Run bench_search
        run: |
          python bench_search.py --input test/test_queries.json --output bench_ci.csv
          if [ $? -ne 0 ]; then
            echo "bench_search failed"
            exit 1
          fi

      - name: Verify artifact exists
        run: |
          if [ ! -f bench_ci.csv ]; then
            echo "bench_ci.csv missing!"
            exit 1
          fi

      - name: Verify artifact size
        run: |
          size=$(stat -c%s bench_ci.csv)
          if [ "$size" -lt 10 ]; then
            echo "bench_ci.csv too small"
            exit 1
          fi

      - name: Smoke assert
        continue-on-error: false
        run: |
          lines=$(wc -l < bench_ci.csv)
          if [ "$lines" -lt 2 ]; then
            echo "Smoke failed: bench_ci.csv too small"
            exit 1
          fi

      - name: Upload bench artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-ci
          path: bench_ci.csv

      - name: Upload mock log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: mock-log
          path: mock.log
git add .github/workflows/smoke.yml
git commit -m "ci: finalize smoke workflow"
git push target ci/add-smoke-diagnostics --force-with-lease
