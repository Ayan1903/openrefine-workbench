name: Smoke Test

on:
  push:
    branches: [ main, ci/* ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            python -m pip install --upgrade pip
            pip install -r requirements.txt
          else
            echo "No requirements.txt found, skipping pip install"
          fi
# GUARDED_INSTALL_MARKER

      - name: Run bench_search smoke
        run: |
          echo "Running bench_search.py..."
          python scripts/bench_search.py --output bench_ci.csv || echo "bench_search failed with exit code $?"
          echo "bench_ci.csv generation attempted"

      - name: Upload artifact bench_ci.csv
        uses: actions/upload-artifact@v4
        with:
          name: bench_ci
          path: bench_ci.csv
