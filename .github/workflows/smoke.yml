name: Smoke Test

on:
  push:
    branches: [ main, ci/* ]
  pull_request:
    branches: [ main ]

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run bench_search smoke
        run: |
          echo "Running bench_search.py..."
          python scripts/bench_search.py --out-csv bench_ci.csv
          echo "bench_ci.csv generated"

      - name: Check bench_ci.csv
        run: |
          echo "PWD: $(pwd)"
          if [ -f bench_ci.csv ]; then
            echo "bench_ci.csv exists"
            head -n 20 bench_ci.csv
          else
            echo "bench_ci.csv not found"
            ls -la
            exit 1
          fi

      - name: Upload artifact bench_ci.csv
        uses: actions/upload-artifact@v4
        with:
          name: bench_ci
          path: bench_ci.csv
