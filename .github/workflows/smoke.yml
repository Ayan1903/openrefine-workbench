name: smoke-test

on:
  workflow_dispatch:

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Guix store + profiles
        uses: actions/cache@v4
        with:
          path: |
            /gnu/store
            /var/guix/profiles
          key: guix-${{ hashFiles('manifest.scm') }}
          restore-keys: guix-

      - name: Cache Maven local repository
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: maven-${{ hashFiles('deps.edn') }}
          restore-keys: maven-

      - name: Setup Guix
        uses: PromyLoph/guix-install-action@v1.6

      - name: Ensure one_embedding.txt exists
        run: |
          python - <<'PY'
          import json, pathlib
          p = pathlib.Path('one_embedding.txt')
          if not p.exists():
              json.dump([0.0]*384, open(p, 'w', encoding='utf-8'))
              print("Created one_embedding.txt (384 zeros)")
          else:
              print("one_embedding.txt already exists")
          PY

      - name: Run smoke test via Guix
        run: guix shell -m manifest.scm -- clojure -A:xtdb -M test/smoke_test.clj trials/samples/repo
